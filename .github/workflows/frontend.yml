name: Frontend CI

on:
  push:
    branches: [main, refactor-post, long-dev]
    paths:
      - 'bento-social-next/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'bento-social-next/**'

defaults:
  run:
    working-directory: bento-social-next

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: bento-social-next/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build Next.js
        run: yarn build
        env:
          NEXT_PUBLIC_API_DOMAIN: http://localhost:3000
