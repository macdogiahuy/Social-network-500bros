version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql-bento
    restart: always
    ports:
      - '${MYSQL_PORT:-3306}:3306'
    env_file:
      - .env
    volumes:
      - social_mysql:/var/lib/mysql
    networks:
      - social
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h localhost -u root -p${MYSQL_ROOT_PASSWORD} --silent" ]
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 30s
    command: >
      --performance_schema=OFF --innodb_buffer_pool_size=256M --innodb_log_file_size=64M --max_connections=100 --thread_cache_size=50

  redis:
    image: redis:7-alpine
    container_name: redis-bento
    restart: always
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-bento:/data
    env_file:
      - .env
    networks:
      - social
    deploy:
      resources:
        limits:
          memory: 256M
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru

  # --- Monolith (default mode) ---
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: always
    ports:
      - '${PORT:-3000}:3000'
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - social
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --- Microservices (uncomment to run individually) ---
  # media-service:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #     args:
  #       SERVICE_ENTRY: src/services/media/index.ts
  #   container_name: media-service
  #   restart: always
  #   ports:
  #     - '3005:3005'
  #   env_file:
  #     - .env
  #   environment:
  #     - MEDIA_SERVICE_PORT=3005
  #   networks:
  #     - social

  # chat-service:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #     args:
  #       SERVICE_ENTRY: src/services/chat/index.ts
  #   container_name: chat-service
  #   restart: always
  #   ports:
  #     - '3003:3003'
  #   env_file:
  #     - .env
  #   environment:
  #     - CHAT_SERVICE_PORT=3003
