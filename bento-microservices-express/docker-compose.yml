# Secrets are loaded from startup/.env via env_file — nothing hardcoded here
version: '3'

services:
  mysql:
    build:
      context: ./mysql
      dockerfile: Dockerfile
    container_name: mysql-bento
    restart: unless-stopped
    ports:
      - '${MYSQL_PORT:-3306}:3306'
    env_file:
      - ../startup/.env # reads MYSQL_ROOT_PASSWORD, MYSQL_DATABASE from one place
    volumes:
      - social_mysql:/var/lib/mysql
      - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
    networks:
      - social
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    stop_grace_period: 30s
    ulimits:
      nofile:
        soft: 20000
        hard: 40000
    command: >
      --performance_schema=OFF --innodb_buffer_pool_size=256M --innodb_log_file_size=64M --max_connections=100 --thread_cache_size=50

  redis:
    image: redis:6.0
    container_name: redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-bento:/data
      - type: bind
        source: ./redis/redis.conf
        target: /usr/local/etc/redis/redis.conf
        read_only: true
    env_file:
      - ../startup/.env # reads REDIS_PASSWORD from one place
    networks:
      - social
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.3'
        reservations:
          memory: 128M
          cpus: '0.1'
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    stop_grace_period: 10s
    ulimits:
      nofile:
        soft: 10000
        hard: 20000

networks:
  social:
    driver: bridge

volumes:
  social_mysql:
    driver: local
  redis-bento:
    driver: local
